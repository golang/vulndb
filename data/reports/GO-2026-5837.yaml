summary: DQL injection via checkUserPassword GraphQL query in github.com/dgraph-io/dgraph
description: |-
    The checkUserPassword GraphQL query in Dgraph is vulnerable to Dgraph Query
    Language (DQL) injection. User-supplied password values are interpolated
    directly into a DQL checkpwd query without escaping or parameterization.
    An attacker can inject a password containing a double-quote character to
    break out of the DQL string literal and append arbitrary DQL query blocks.

id: GO-2026-5029
modules:
    - module: golang.org/x/net
      versions:
        - fixed: 0.55.0
      vulnerable_at: 0.54.0
      packages:
        - package: golang.org/x/net/html
          symbols:
            - parser.parse
          derived_symbols:
            - Parse
            - ParseFragment
            - ParseFragmentWithOptions
            - ParseWithOptions
summary: Invoking  incorrect handling of character references in DOCTYPE nodes in golang.org/x/net/html
description: |
    Parsing arbitrary HTML which is then rendered using Render can result in an
    unexpected HTML tree. This can be leveraged to execute XSS attacks in
    applications that attempt to sanitize input HTML before rendering.
credits:
    - ensy
references:

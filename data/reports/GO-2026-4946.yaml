id: GO-2026-4946
modules:
    - module: std
      versions:
        - fixed: 1.25.9
        - introduced: 1.26.0-0
        - fixed: 1.26.2
      vulnerable_at: 1.26.1
      packages:
        - package: crypto/x509
          symbols:
            - policiesValid
          derived_symbols:
            - Certificate.Verify
summary: Inefficient policy validation in crypto/x509
description: |-
    Validating certificate chains which use policies is unexpectedly inefficient
    when certificates in the chain contain a very large number of policy mappings,
    possibly causing denial of service.

    This only affects validation of otherwise trusted certificate chains, issued by
    a root CA in the VerifyOptions.Roots CertPool, or in the system certificate
    pool.

summary: Oversized OTLP HTTP response bodies can cause memory exhaustion in go.opentelemetry.io/otel/exporters/otlp
description: |-
    The OTLP HTTP exporters (traces, metrics, and logs) do not limit the size of the
    HTTP response body read from the collector. A malicious or misconfigured
    collector can send a large response body, leading to excessive memory
    consumption and potential process termination (OOM).

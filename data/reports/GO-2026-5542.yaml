summary: Path traversal via malicious package name in github.com/zarf-dev/zarf
description: |-
    A path traversal vulnerability in Zarf allows an attacker to write arbitrary
    files on the host system by providing a malicious package name in the package
    metadata. This occurs when Zarf generates SBOM or documentation outputs, or when
    creating a package, as it fails to properly sanitize the package name before
    using it in a file path.

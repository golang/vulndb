id: GO-2026-4865
modules:
    - module: std
      versions:
        - fixed: 1.25.9
        - introduced: 1.26.0-0
        - fixed: 1.26.2
      vulnerable_at: 1.26.1
      packages:
        - package: html/template
          symbols:
            - context.String
            - context.mangle
            - escaper.escapeBranch
          derived_symbols:
            - Error.Error
            - HTMLEscaper
            - JSEscape
            - JSEscapeString
            - JSEscaper
            - ParseFS
            - ParseFiles
            - ParseGlob
            - Template.AddParseTree
            - Template.Clone
            - Template.DefinedTemplates
            - Template.Execute
            - Template.ExecuteTemplate
            - Template.Funcs
            - Template.Parse
            - Template.ParseFS
            - Template.ParseFiles
            - Template.ParseGlob
            - URLQueryEscaper
summary: JsBraceDepth Context Tracking Bugs (XSS) in html/template
description: |-
    Context was not properly tracked across template branches for JS template
    literals, leading to possibly incorrect escaping of content when branches were
    used. Additionally template actions within JS template literals did not properly
    track the brace depth, leading to incorrect escaping being applied.

    These issues could cause actions within JS template literals to be incorrectly
    or improperly escaped, leading to XSS vulnerabilities.
references:

    - report: https://go.dev/issue/78334
    - web: https://groups.google.com/g/golang-announce/c/0uYbvbPZRWU
cve_metadata:
    id: CVE-2026-32283
    cwe: 'CWE-667: Improper Locking'
source:
    id: go-security-team
review_status: REVIEWED

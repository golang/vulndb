id: GO-2026-4600
modules:
    - module: std
      versions:
        - introduced: 1.26.0-0
        - fixed: 1.26.1
      vulnerable_at: 1.26.0
      packages:
        - package: crypto/x509
          symbols:
            - dnsConstraints.query
          derived_symbols:
            - Certificate.Verify
summary: Panic in name constraint checking for malformed certificates in crypto/x509
description: |-
    Certificate verification can panic when a certificate in the chain has an empty
    DNS name and another certificate in the chain has excluded name constraints.
    This can crash programs that are either directly verifying X.509 certificate
    chains, or those that use TLS.

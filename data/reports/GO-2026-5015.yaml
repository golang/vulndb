id: GO-2026-5015
modules:
    - module: golang.org/x/crypto
      versions:
        - fixed: 0.52.0
      vulnerable_at: 0.51.0
      packages:
        - package: golang.org/x/crypto/ssh
          symbols:
            - CertChecker.CheckHostKey
            - CertChecker.Authenticate
summary: Invoking  server panic during CheckHostKey/Authenticate in golang.org/x/crypto/ssh
description: |
    SSH servers which use CertChecker as a public key
    callback without setting IsUserAuthority or
    IsHostAuthority could be caused to panic by a
    client presenting a certificate. CertChecker now
    returns an error instead of panicking when these
    callbacks are nil.

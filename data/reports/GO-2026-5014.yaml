    - web: https://groups.google.com/g/golang-announce/c/a082jnz-LvI
    - fix: https://go.dev/cl/781621
cve_metadata:
    id: CVE-2026-39828
    cwe: 'CWE-863: Incorrect Authorization'
source:
    id: go-security-team
review_status: REVIEWED

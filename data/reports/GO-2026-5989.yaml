summary: Unauthenticated OIDC login in nebula-mesh allows unbounded memory allocation in github.com/forgekeep/nebula-mesh
description: |-
    When OIDC is enabled, the login endpoint is reachable without authentication and
    is registered outside the rate-limited auth routes. Every request creates a
    fresh random OIDC state value and stores it in an in-memory map.

    An unauthenticated remote client can grow the state storage, bounded by request
    throughput rather than by configured auth rate limits, potentially leading to a
    denial of service.

    - fix: https://go.dev/cl/781685
cve_metadata:
    id: CVE-2026-27136
    cwe: 'CWE-79: Improper Neutralization of Input During Web Page Generation (''Cross-site Scripting'')'
source:
    id: go-security-team
review_status: REVIEWED

id: GO-2026-4599
modules:
    - module: std
      versions:
        - introduced: 1.26.0-0
        - fixed: 1.26.1
      vulnerable_at: 1.26.0
      packages:
        - package: crypto/x509
          symbols:
            - newEmailConstraints
            - emailConstraints.query
            - checkConstraints
            - checkChainConstraints
            - parseMailboxes
          derived_symbols:
            - Certificate.Verify
summary: Incorrect enforcement of email constraints in crypto/x509
description: |-
    When verifying a certificate chain which contains a certificate containing
    multiple email address constraints which share common local portions but
    different domain portions, these constraints will not be properly applied, and
    only the last constraint will be considered.
credits:
    - Jakub Ciolek

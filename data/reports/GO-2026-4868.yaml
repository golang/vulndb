id: GO-2026-4868
modules:
    - module: cmd
      versions:
        - fixed: 1.25.9
        - introduced: 1.26.0-0
        - fixed: 1.26.2
      vulnerable_at: 1.26.1
      packages:
        - package: cmd/compile
summary: Missing bound checks can lead to memory corruption in safe Go in cmd/compile
description: |-
    Arithmetic over induction variables in loops were not correctly checked for
    underflow or overflow. As a result, the compiler would allow for invalid
    indexing to occur at runtime, potentially leading to memory corruption.

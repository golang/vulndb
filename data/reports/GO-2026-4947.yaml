id: GO-2026-4947
modules:
    - module: std
      versions:
        - fixed: 1.25.9
        - introduced: 1.26.0-0
        - fixed: 1.26.2
      vulnerable_at: 1.26.1
      packages:
        - package: crypto/x509
          symbols:
            - Certificate.buildChains
          derived_symbols:
            - Certificate.Verify
summary: Unexpected work during chain building in crypto/x509
description: |-
    During chain building, the amount of work that is done is not correctly limited
    when a large number of intermediate certificates are passed in
    VerifyOptions.Intermediates, which can lead to a denial of service. This affects
    both direct users of crypto/x509 and users of crypto/tls.
credits:

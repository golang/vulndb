      vulnerable_at: 2.3.3
      packages:
        - package: github.com/jackc/pgproto3/v2
          symbols:
            - DataRow.Decode
          derived_symbols:
            - Frontend.Receive
summary: Denial of service in github.com/jackc/pgproto3/v2
description: |-
    The DataRow.Decode function fails to properly validate field lengths. A
    malicious or compromised PostgreSQL server can send a DataRow message with
    a negative field length, causing a slice bounds out of range panic.

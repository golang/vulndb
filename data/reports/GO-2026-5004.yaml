summary: |-
    SQL Injection via placeholder confusion with dollar quoted string literals in
    github.com/jackc/pgx
description: |-
    SQL Injection can occur when using the non-default simple protocol with a dollar
    quoted string literal in the SQL query. If that string literal contains text
    that would be interpreted as a placeholder outside of a string literal, and the
    value of that placeholder is controllable by the attacker, an injection may be
    possible.

    For example, an attacker could provide a value that includes a closing dollar
    quote followed by malicious SQL commands. This is unlikely to occur outside of a
    contrived scenario.

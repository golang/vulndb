id: GO-2026-4982
modules:
    - module: std
      versions:
        - fixed: 1.25.10
        - introduced: 1.26.0-0
        - fixed: 1.26.3
      vulnerable_at: 1.26.2
      packages:
        - package: html/template
          symbols:
            - tMetaContent
          derived_symbols:
            - Template.Execute
            - Template.ExecuteTemplate
summary: Bypass of meta content URL escaping causes XSS in html/template
description: |
    CVE-2026-27142 fixed a vulnerability in which URLs were not
    correctly escaped inside of a <meta> tag's <content> attribute.
    If the URL content were to insert ASCII whitespaces around the
    '=' rune inside of the <content> attribute, the escaper would
    fail to similarly escape it, leading to XSS.
credits:
    - Samy Ghannad
references:

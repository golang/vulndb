id: GO-2026-5032
modules:
    - module: golang.org/x/image
      versions:
        - fixed: 0.41.0
      vulnerable_at: 0.40.0
      packages:
        - package: golang.org/x/image/tiff
          symbols:
            - unpackBits
          derived_symbols:
            - Decode
summary: Excessive resource consumption in PackBits decompression in golang.org/x/image/tiff
description: |
    The TIFF decoder does not place a limit on the size of PackBits-compressed data.
    A maliciously-crafted image can exploit this to cause a small image (both in
    terms of pixel width/height and encoded size) to make the decoder decode large
    amounts of compressed data.
credits:

id: GO-2026-5026
modules:
    - module: golang.org/x/net
      versions:
        - fixed: 0.55.0
      vulnerable_at: 0.54.0
      packages:
        - package: golang.org/x/net/idna
          symbols:
            - Profile.process
          derived_symbols:
            - Profile.ToASCII
            - Profile.ToUnicode
            - ToASCII
            - ToUnicode
summary: |-
    Invoking failure to reject ASCII-only Punycode-encoded labels in
    golang.org/x/net/idna
description: |-
    The ToASCII and ToUnicode functions incorrectly accept Punycode-encoded labels
    that decode to an ASCII-only label. For example, ToUnicode("xn--example-.com")
    incorrectly returns the name "example.com" rather than an error.

    This behavior can lead to privilege escalation in programs using the idna
    package. For example, a program which performs privilege checks on the ASCII
    hostname may reject "example.com" but permit "xn--example-.com". If that program
    subsequently converts the ASCII hostname to Unicode, it will inadvertently
    permits access to the Unicode name "example.com".

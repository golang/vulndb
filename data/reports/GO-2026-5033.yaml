    - fix: https://go.dev/cl/781360
    - web: https://groups.google.com/g/golang-announce/c/a082jnz-LvI
cve_metadata:
    id: CVE-2026-46598
    cwe: 'CWE-129: Improper Validation of Array Index'
source:
    id: go-security-team
review_status: REVIEWED

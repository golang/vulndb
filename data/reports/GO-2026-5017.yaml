id: GO-2026-5017
modules:
    - module: golang.org/x/crypto
      versions:
        - fixed: 0.52.0
      vulnerable_at: 0.51.0
      packages:
        - package: golang.org/x/crypto/ssh
          symbols:
            - mux.SendRequest
            - mux.handleGlobalPacket
            - channel.handlePacket
            - channel.SendRequest
          derived_symbols:
            - Client.Listen
            - Client.ListenTCP
            - Client.ListenUnix
            - Dial
            - NewClientConn
            - NewServerConn
            - Session.CombinedOutput
            - Session.Output
            - Session.RequestPty
            - Session.RequestSubsystem
            - Session.Run
            - Session.SendRequest
            - Session.Setenv
            - Session.Shell
            - Session.Signal
            - Session.Start
            - Session.WindowChange
            - tcpListener.Close
            - unixListener.Close
summary: Invoking  client can cause server deadlock on unexpected responses in golang.org/x/crypto/ssh
description: |
    A malicious SSH peer could send unsolicited global request
    responses to fill an internal buffer, blocking the connection's
    read loop. The blocked goroutine could not be released by calling
    Close(), resulting in a resource leak per connection. Unsolicited
    global responses are now discarded.

    - fix: https://go.dev/cl/781640
    - fix: https://go.dev/cl/781664
cve_metadata:
    id: CVE-2026-39830
    cwe: 'CWE-833: Deadlock'
source:
    id: go-security-team
review_status: REVIEWED

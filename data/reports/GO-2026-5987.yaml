summary: Insecure enrollment token TTL in nebula-mesh in github.com/forgekeep/nebula-mesh
description: |-
    The nebula-mesh Web UI host creation ignores the configured enrollment token TTL
    and instead mints 24-hour bearer enrollment tokens. This can lead to tokens
    remaining valid for longer than intended, increasing the window of opportunity
    for an attacker to use an intercepted token.

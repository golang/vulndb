summary: Infinite loop in github.com/antchfx/xpath
description: |-
    Boolean XPath expressions that evaluate to true can cause an infinite loop
    in logicalQuery.Select, leading to 100% CPU usage. This can be triggered
    by top-level selectors such as "1=1" or "true()".

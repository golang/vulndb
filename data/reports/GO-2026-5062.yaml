id: GO-2026-5062
modules:
    - module: golang.org/x/image
      versions:
        - fixed: 0.43.0
      vulnerable_at: 0.42.0
      packages:
        - package: golang.org/x/image/tiff
          symbols:
            - Decode
summary: Lack of limit on tile sizes in x/image/tiff in golang.org/x/image
description: |-
    The TIFF decoder does not set a limit on the size of tiles in tiled images,
    permitting a malicious or corrupt image containing a very large tile to cause
    unbounded memory consumption.

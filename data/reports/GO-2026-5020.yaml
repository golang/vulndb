id: GO-2026-5020
modules:
    - module: golang.org/x/crypto
      versions:
        - fixed: 0.52.0
      vulnerable_at: 0.51.0
      packages:
        - package: golang.org/x/crypto/ssh
          symbols:
            - channel.WriteExtended
          derived_symbols:
            - Dial
            - NewClientConn
            - NewServerConn
            - Session.CombinedOutput
            - Session.Output
            - Session.Run
            - Session.Shell
            - Session.Start
            - channel.Write
            - curve25519sha256.Client
            - curve25519sha256.Server
            - dhGEXSHA.Client
            - dhGEXSHA.Server
            - dhGroup.Client
            - dhGroup.Server
            - ecdh.Client
            - ecdh.Server
            - extChannel.Write
            - mlkem768WithCurve25519sha256.Client
            - mlkem768WithCurve25519sha256.Server
summary: Invoking  infinite loop on large channel writes in golang.org/x/crypto/ssh
description: |
    When writing data larger than 4GB in a single Write
    call on an SSH channel, an integer overflow in the
    internal payload size calculation caused the write
    loop to spin indefinitely, sending empty packets
    without making progress. The size comparison now
    uses int64 to prevent truncation.

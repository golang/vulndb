summary: Denial of service in github.com/shamaton/msgpack
description: |-
    The msgpack decoder fails to properly validate the input buffer length when
    processing truncated fixext data (format codes 0xd4-0xd8). This can lead to
    an out-of-bounds read and a runtime panic, allowing a denial of service
    attack.

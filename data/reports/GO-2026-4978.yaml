      versions:
        - fixed: 1.25.10
        - introduced: 1.26.0-0
        - fixed: 1.26.3
      vulnerable_at: 1.26.2
      packages:
        - package: cmd/go
summary: Invoking "go bug" follows symlinks in predictable temporary filenames in cmd/go
description: |
    The "go bug" command writes to two files with predictable names in
    the system temporary directory (for example, "/tmp").

    An attacker with access to the temporary directory can create a
    symlink in one of these names, causing "go bug" to overwrite the
    target of the symlink.

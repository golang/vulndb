summary: DQL injection via unsanitized NQuad Lang field in github.com/dgraph-io/dgraph
description: |-
    A vulnerability in Dgraph allows an unauthenticated attacker full read access to
    data in the database when ACL is not enabled.

    The injection exploits the addQueryIfUnique function, which constructs DQL
    queries using fmt.Sprintf with an unsanitized predicate name that includes the
    raw Lang value from a JSON mutation key. An attacker can escape the function and
    inject arbitrary named query blocks, which execute server-side and return
    results in the HTTP response.

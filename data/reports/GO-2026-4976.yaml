id: GO-2026-4976
modules:
    - module: std
      versions:
        - fixed: 1.25.10
        - introduced: 1.26.0-0
        - fixed: 1.26.3
      vulnerable_at: 1.26.2
      packages:
        - package: net/http/httputil
          symbols:
            - cleanQueryParams
          derived_symbols:
            - ReverseProxy.ServeHTTP
summary: |-
    ReverseProxy forwards queries with more than urlmaxqueryparams parameters in
    net/http/httputil
description: |-
    ReverseProxy can forward queries containing parameters not visible to Rewrite
    functions.

    When used with a Rewrite function, or a Director function which parses query
    parameters, ReverseProxy sanitizes the forwarded request to remove query
    parameters which are not parsed by url.ParseQuery. ReverseProxy does not take
    ParseQuery's limit on the total number of query parameters (controlled by
    GODEBUG=urlmaxqueryparams=N) into account. This can permit ReverseProxy to
    forward a request containing a query parameter that is not visible to the
    Rewrite function.

    For example, the query "a1=x&a2=x&...&a10000=x&hidden=y" can forward the
    parameter "hidden=y" while hiding it from the proxy's Rewrite function.
references:

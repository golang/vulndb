summary: Unauthenticated admin token disclosure via /debug/vars in github.com/dgraph-io/dgraph
description: |-
    The /debug/vars endpoint in Dgraph Alpha discloses the administrator's
    authentication token without requiring authentication. This allows an
    unauthenticated remote attacker to obtain the token and gain full administrative
    access to the Dgraph cluster.

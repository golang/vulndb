id: GO-2026-4869
modules:
    - module: std
      versions:
        - fixed: 1.25.9
        - introduced: 1.26.0-0
        - fixed: 1.26.2
      vulnerable_at: 1.26.1
      packages:
        - package: archive/tar
          symbols:
            - Reader.readOldGNUSparseMap
            - readGNUSparseMap1x0
          derived_symbols:
            - Reader.Next
summary: Unbounded allocation for old GNU sparse in archive/tar
description: |-
    tar.Reader can allocate an unbounded amount of memory when reading a
    maliciously-crafted archive containing a large number of sparse regions encoded
    in the "old GNU sparse map" format.
